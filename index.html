<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adult Zebrafish Brain Atlas 3D</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0a0a0f; color: #e8e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid #222; background: #0f0f1a; flex-shrink: 0; }
  header h1 { font-size: 16px; font-weight: 500; letter-spacing: 0.04em; color: #a0c4ff; }
  header span { font-size: 12px; color: #555; }
  .main { display: flex; flex: 1; overflow: hidden; }
  #sidebar { width: 240px; background: #0f0f1a; border-right: 1px solid #1e1e2e; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
  #sidebar-header { padding: 12px 14px 8px; border-bottom: 1px solid #1e1e2e; }
  #search { width: 100%; background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 6px; padding: 6px 10px; color: #e8e8f0; font-size: 12px; outline: none; }
  #search:focus { border-color: #4a7fd4; }
  #region-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .region-item { display: flex; align-items: center; gap: 8px; padding: 5px 14px; cursor: pointer; font-size: 12px; color: #aaa; transition: background 0.1s; user-select: none; }
  .region-item:hover { background: #1a1a2e; color: #e8e8f0; }
  .region-item.active { background: #1a2a4a; color: #a0c4ff; }
  .region-item.hidden-region { opacity: 0.35; }
  .swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .region-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .eye-btn { font-size: 11px; color: #444; flex-shrink: 0; }
  .region-item:hover .eye-btn { color: #888; }
  #viewport { flex: 1; position: relative; }
  #canvas { width: 100%; height: 100%; display: block; }
  #info { position: absolute; bottom: 20px; right: 20px; background: #0f0f1aee; border: 1px solid #2a2a3e; border-radius: 10px; padding: 14px 16px; min-width: 220px; max-width: 280px; display: none; }
  #info h2 { font-size: 14px; font-weight: 500; color: #a0c4ff; margin-bottom: 4px; }
  #info .info-abbr { font-size: 11px; color: #555; margin-bottom: 8px; }
  #info .info-row { display: flex; justify-content: space-between; font-size: 12px; color: #888; padding: 2px 0; }
  #info .info-row span:last-child { color: #ccc; }
  #info-close { position: absolute; top: 8px; right: 10px; background: none; border: none; color: #555; cursor: pointer; font-size: 16px; line-height: 1; }
  #info-hide { margin-top: 10px; width: 100%; background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 6px; color: #aaa; padding: 5px; font-size: 11px; cursor: pointer; }
  #info-hide:hover { background: #2a2a3e; color: #e8e8f0; }
  #controls { position: absolute; top: 14px; right: 14px; display: flex; flex-direction: column; gap: 6px; min-width: 160px; }
  .ctrl-btn { background: #0f0f1acc; border: 1px solid #2a2a3e; border-radius: 6px; color: #aaa; padding: 6px 12px; font-size: 11px; cursor: pointer; white-space: nowrap; }
  .ctrl-btn:hover { background: #1a1a2ecc; color: #e8e8f0; }
  .ctrl-slider { background: #0f0f1acc; border: 1px solid #2a2a3e; border-radius: 6px; padding: 7px 12px; font-size: 11px; color: #aaa; }
  .ctrl-slider label { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .ctrl-slider input[type=range] { width: 100%; accent-color: #4a7fd4; cursor: pointer; }
  #loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0f; gap: 12px; }
  #loading-bar-wrap { width: 200px; height: 3px; background: #1a1a2e; border-radius: 2px; }
  #loading-bar { height: 100%; background: #4a7fd4; border-radius: 2px; width: 0%; transition: width 0.2s; }
  #loading-text { font-size: 12px; color: #555; }
  #hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #333; pointer-events: none; }
</style>
</head>
<body>
<header>
  <h1>Adult Zebrafish Brain Atlas 3D</h1>
  <span id="loaded-count">Loading...</span>
</header>
<div class="main">
  <div id="sidebar">
    <div id="sidebar-header">
      <input id="search" type="text" placeholder="Search regions..." />
    </div>
    <div id="region-list"></div>
  </div>
  <div id="viewport">
    <canvas id="canvas"></canvas>
    <div id="loading">
      <div style="font-size:13px;color:#555;">Loading brain regions...</div>
      <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
      <div id="loading-text">0 / 0</div>
    </div>
    <div id="controls">
      <button class="ctrl-btn" id="btn-rotate">Auto-rotate: ON</button>
      <button class="ctrl-btn" id="btn-all">Show all</button>
      <button class="ctrl-btn" id="btn-none">Hide all</button>
      <button class="ctrl-btn" id="btn-reset">Reset view</button>
      <div class="ctrl-slider">
        <label><span>Opacity</span><span id="opacity-val">85%</span></label>
        <input type="range" id="opacity-slider" min="5" max="100" value="85" step="1">
      </div>
      <div class="ctrl-slider">
        <label><span>Shininess</span><span id="shine-val">40</span></label>
        <input type="range" id="shine-slider" min="0" max="150" value="40" step="5">
      </div>
    </div>
    <div id="info">
      <button id="info-close">x</button>
      <h2 id="info-name"></h2>
      <div class="info-abbr" id="info-abbr"></div>
      <div class="info-row"><span>Region ID</span><span id="info-id"></span></div>
      <div class="info-row"><span>Voxels</span><span id="info-voxels"></span></div>
      <div class="info-row"><span>Faces</span><span id="info-faces"></span></div>
      <button id="info-hide">Hide this region</button>
    </div>
    <div id="hint">Left-drag: rotate · Right-drag: pan · Scroll: zoom · Shift+click: multi-select</div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Renderer ──────────────────────────────────────────────────
var canvas = document.getElementById('canvas');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x0a0a0f);

var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(45, 1, 0.0001, 100);
camera.position.set(0, 0.2, 2.5);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
var dl = new THREE.DirectionalLight(0xffffff, 0.9);
dl.position.set(2, 3, 3); scene.add(dl);
var dl2 = new THREE.DirectionalLight(0x88aaff, 0.4);
dl2.position.set(-2, -1, -2); scene.add(dl2);

function resize() {
  var vp = document.getElementById('viewport');
  renderer.setSize(vp.clientWidth, vp.clientHeight);
  camera.aspect = vp.clientWidth / vp.clientHeight;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ── Brain group ───────────────────────────────────────────────
var brainGroup = new THREE.Group();
scene.add(brainGroup);

// ── Controls ──────────────────────────────────────────────────
var isDrag = false, isPan = false, autoRotate = true;
var panX = 0, panY = 0, lastX, lastY;
var quaternion = new THREE.Quaternion();
quaternion.setFromEuler(new THREE.Euler(0.2, 0, 0));

canvas.addEventListener('mousedown', function(e) {
  if (e.button === 2 || e.button === 1) { isPan = true; }
  else { isDrag = true; autoRotate = false; document.getElementById('btn-rotate').textContent = 'Auto-rotate: OFF'; }
  lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mousemove', function(e) {
  var dx = e.clientX - lastX, dy = e.clientY - lastY;
  if (isPan) { panX += dx * 0.002; panY -= dy * 0.002; }
  else if (isDrag) {
    var qY = new THREE.Quaternion(); qY.setFromAxisAngle(new THREE.Vector3(0,1,0), dx * 0.005);
    var qX = new THREE.Quaternion(); qX.setFromAxisAngle(new THREE.Vector3(1,0,0), dy * 0.005);
    quaternion.premultiply(qY).premultiply(qX);
  }
  lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mouseup', function() { isDrag = false; isPan = false; });
canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });
canvas.addEventListener('wheel', function(e) {
  camera.position.z = Math.max(0.3, Math.min(5, camera.position.z + e.deltaY * 0.001));
});

// ── GLB loader ────────────────────────────────────────────────
function loadGLB(url) {
  return fetch(url).then(function(r) {
    if (!r.ok) throw new Error('404');
    return r.arrayBuffer();
  }).then(function(buf) {
    var dv = new DataView(buf);
    var jsonLen = dv.getUint32(12, true);
    var jsonStr = new TextDecoder().decode(new Uint8Array(buf, 20, jsonLen));
    var gltf = JSON.parse(jsonStr);
    var binOffset = 20 + jsonLen + 8;
    var bin = buf.slice(binOffset);
    var prim = gltf.meshes[0].primitives[0];
    var posAcc = gltf.accessors[prim.attributes.POSITION];
    var idxAcc = gltf.accessors[prim.indices];
    var posBv = gltf.bufferViews[posAcc.bufferView];
    var idxBv = gltf.bufferViews[idxAcc.bufferView];
    var positions = new Float32Array(bin, posBv.byteOffset || 0, posBv.byteLength / 4);
    var indices;
    if (idxAcc.componentType === 5125) {
      indices = new Uint32Array(bin, idxBv.byteOffset || 0, idxBv.byteLength / 4);
    } else if (idxAcc.componentType === 5123) {
      indices = new Uint16Array(bin, idxBv.byteOffset || 0, idxBv.byteLength / 2);
    } else {
      indices = new Uint8Array(bin, idxBv.byteOffset || 0, idxBv.byteLength);
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions.slice(), 3));
    geo.setIndex(new THREE.BufferAttribute(indices.slice(), 1));
    geo.computeVertexNormals();
    return geo;
  });
}

// ── State ─────────────────────────────────────────────────────
var meshMap = {};
var regionMeta = {};
var selectedIds = new Set();
var lastSelectedId = null;
var currentOpacity = 0.85;

// ── Helpers ───────────────────────────────────────────────────
function highlightMesh(id) {
  if (!meshMap[id]) return;
  meshMap[id].material.color.setRGB(1, 1, 0.3);
  meshMap[id].material.opacity = 1.0;
}
function unhighlightMesh(id) {
  if (!meshMap[id] || !regionMeta[id]) return;
  var c = regionMeta[id].color;
  meshMap[id].material.color.setRGB(c[0]/255, c[1]/255, c[2]/255);
  meshMap[id].material.opacity = currentOpacity;
}
function showInfoPanel(id) {
  var reg = regionMeta[id];
  if (!reg) return;
  document.getElementById('info-name').textContent = reg.name;
  document.getElementById('info-abbr').textContent = 'ID: ' + reg.id;
  document.getElementById('info-id').textContent = reg.id;
  document.getElementById('info-voxels').textContent = reg.voxels ? reg.voxels.toLocaleString() : '-';
  document.getElementById('info-faces').textContent = reg.faces ? reg.faces.toLocaleString() : '-';
  document.getElementById('info').style.display = 'block';
}
function hideRegionById(id) {
  if (!meshMap[id]) return;
  meshMap[id].visible = false;
  var item = document.querySelector('.region-item[data-id="' + id + '"]');
  if (item) { item.classList.add('hidden-region'); item.classList.remove('active'); }
  unhighlightMesh(id);
  selectedIds.delete(id);
  if (id === lastSelectedId) {
    if (selectedIds.size > 0) {
      lastSelectedId = Array.from(selectedIds).pop();
      showInfoPanel(lastSelectedId);
    } else {
      lastSelectedId = null;
      document.getElementById('info').style.display = 'none';
    }
  }
}
function selectRegion(id, item, shiftHeld) {
  if (shiftHeld) {
    if (selectedIds.has(id)) {
      selectedIds.delete(id);
      unhighlightMesh(id);
      if (item) item.classList.remove('active');
      if (selectedIds.size > 0) {
        lastSelectedId = Array.from(selectedIds).pop();
        showInfoPanel(lastSelectedId);
      } else {
        lastSelectedId = null;
        document.getElementById('info').style.display = 'none';
      }
    } else {
      selectedIds.add(id);
      highlightMesh(id);
      if (item) item.classList.add('active');
      lastSelectedId = id;
      showInfoPanel(id);
    }
  } else {
    if (selectedIds.size === 1 && selectedIds.has(id)) {
      selectedIds.clear();
      unhighlightMesh(id);
      if (item) item.classList.remove('active');
      document.getElementById('info').style.display = 'none';
      lastSelectedId = null;
    } else {
      selectedIds.forEach(function(sid) { unhighlightMesh(sid); });
      document.querySelectorAll('.region-item').forEach(function(el) { el.classList.remove('active'); });
      selectedIds.clear();
      selectedIds.add(id);
      highlightMesh(id);
      if (item) item.classList.add('active');
      lastSelectedId = id;
      showInfoPanel(id);
    }
  }
}

  var loaded = 0, total = regions.length;
  txt.textContent = '0 / ' + total;

  var promises = regions.map(function(reg) {
    // UPDATED LINE: Added 'models/' prefix to the filename
    var modelPath = 'models/' + reg.file; 
    
    return loadGLB(modelPath).then(function(geo) {
      var c = reg.color;
      var mat = new THREE.MeshPhongMaterial({
        color: new THREE.Color(c[0]/255, c[1]/255, c[2]/255),
        transparent: true, opacity: currentOpacity, shininess: 40
      });
      var mesh = new THREE.Mesh(geo, mat);
      mesh.userData.regionId = reg.id;
      brainGroup.add(mesh);
      meshMap[reg.id] = mesh;
      regionMeta[reg.id] = reg;
    }).catch(function(err) {
        console.error("Could not load model:", modelPath, err);
    }).finally(function() {
      loaded++;
      bar.style.width = (loaded / total * 100) + '%';
      txt.textContent = loaded + ' / ' + total;
    });
  });

  Promise.all(promises).then(function() {
    var box = new THREE.Box3();
    brainGroup.children.forEach(function(m) { box.expandByObject(m); });
    var center = box.getCenter(new THREE.Vector3());
    brainGroup.children.forEach(function(m) { m.position.sub(center); });
    var size = box.getSize(new THREE.Vector3());
    brainGroup.scale.setScalar(1.2 / Math.max(size.x, size.y, size.z));
    document.getElementById('loading').style.display = 'none';
    document.getElementById('loaded-count').textContent = Object.keys(meshMap).length + ' regions loaded | By Ian Lee 🐟';
    buildSidebar(regions);
  });
}

// ── Sidebar ───────────────────────────────────────────────────
function buildSidebar(regions) {
  var listEl = document.getElementById('region-list');
  listEl.innerHTML = '';
  regions.forEach(function(reg) {
    if (!meshMap[reg.id]) return;
    var c = reg.color;
    var item = document.createElement('div');
    item.className = 'region-item';
    item.dataset.id = reg.id;
    item.innerHTML =
      '<div class="swatch" style="background:rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')"></div>' +
      '<span class="region-name" title="' + reg.name + '">' + reg.name + '</span>' +
      '<span class="eye-btn">●</span>';
    item.addEventListener('click', function(e) {
      if (e.target.classList.contains('eye-btn')) toggleRegion(reg.id, item);
      else selectRegion(reg.id, item, e.shiftKey);
    });
    listEl.appendChild(item);
  });
}

function toggleRegion(id, item) {
  var mesh = meshMap[id];
  if (!mesh) return;
  mesh.visible = !mesh.visible;
  item.classList.toggle('hidden-region', !mesh.visible);
}

// ── Raycaster ─────────────────────────────────────────────────
var raycaster = new THREE.Raycaster();
var mouse2d = new THREE.Vector2();
canvas.addEventListener('click', function(e) {
  if (isDrag || isPan) return;
  var rect = canvas.getBoundingClientRect();
  mouse2d.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse2d.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse2d, camera);
  var visible = brainGroup.children.filter(function(m) { return m.visible; });
  var hits = raycaster.intersectObjects(visible);
  if (hits.length > 0) {
    var id = hits[0].object.userData.regionId;
    var item = document.querySelector('.region-item[data-id="' + id + '"]');
    selectRegion(id, item, e.shiftKey);
  }
});

// ── Button handlers ───────────────────────────────────────────
document.getElementById('info-close').addEventListener('click', function() {
  selectedIds.forEach(function(id) { unhighlightMesh(id); });
  document.querySelectorAll('.region-item').forEach(function(el) { el.classList.remove('active'); });
  selectedIds.clear();
  lastSelectedId = null;
  document.getElementById('info').style.display = 'none';
});

document.getElementById('info-hide').addEventListener('click', function() {
  if (lastSelectedId !== null) hideRegionById(lastSelectedId);
});

document.getElementById('btn-rotate').addEventListener('click', function() {
  autoRotate = !autoRotate;
  this.textContent = 'Auto-rotate: ' + (autoRotate ? 'ON' : 'OFF');
});

document.getElementById('btn-reset').addEventListener('click', function() {
  panX = 0; panY = 0;
  quaternion.setFromEuler(new THREE.Euler(0.2, 0, 0));
  camera.position.z = 2.5;
});

document.getElementById('btn-all').addEventListener('click', function() {
  Object.values(meshMap).forEach(function(m) { m.visible = true; });
  document.querySelectorAll('.region-item').forEach(function(el) { el.classList.remove('hidden-region'); });
});

document.getElementById('btn-none').addEventListener('click', function() {
  Object.values(meshMap).forEach(function(m) { m.visible = false; });
  document.querySelectorAll('.region-item').forEach(function(el) { el.classList.add('hidden-region'); });
});

document.getElementById('opacity-slider').addEventListener('input', function(e) {
  currentOpacity = parseInt(e.target.value) / 100;
  document.getElementById('opacity-val').textContent = e.target.value + '%';
  Object.entries(meshMap).forEach(function(entry) {
    if (!selectedIds.has(parseInt(entry[0]))) entry[1].material.opacity = currentOpacity;
  });
});

document.getElementById('shine-slider').addEventListener('input', function(e) {
  document.getElementById('shine-val').textContent = e.target.value;
  Object.values(meshMap).forEach(function(m) { m.material.shininess = parseInt(e.target.value); });
});

document.getElementById('search').addEventListener('input', function(e) {
  var q = e.target.value.toLowerCase();
  document.querySelectorAll('.region-item').forEach(function(el) {
    el.style.display = el.querySelector('.region-name').textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});

// ── Animate ───────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  if (autoRotate && !isDrag && !isPan) {
    var q = new THREE.Quaternion();
    q.setFromAxisAngle(new THREE.Vector3(0,1,0), 0.003);
    quaternion.premultiply(q);
  }
  brainGroup.quaternion.copy(quaternion);
  brainGroup.position.x = panX;
  brainGroup.position.y = panY;
  renderer.render(scene, camera);
}
animate();

// ── Start ─────────────────────────────────────────────────────
loadRegions(REGIONS);
</script>
</body>
</html>
